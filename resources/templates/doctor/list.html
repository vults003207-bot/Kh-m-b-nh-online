<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách bác sĩ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">
        <h2>Danh sách bác sĩ</h2>
        <a th:href="@{/patient/dashboard}" class="btn btn-secondary">
            Dashboard
        </a>
    </div>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="doctor : ${doctors}">

            <div class="card shadow border-0 h-100">

                <img th:src="${doctor.imageUrl != null ? doctor.imageUrl : 'https://via.placeholder.com/400x250'}"
                     class="card-img-top"
                     style="height: 220px; object-fit: cover;">

                <div class="card-body">

                    <h5 th:text="${doctor.user.fullName}">
                        Tên bác sĩ
                    </h5>

                    <p>
                        <strong>Chuyên khoa:</strong>
                        <span th:text="${doctor.specialization}"></span>
                    </p>

                    <p>
                        <strong>Kinh nghiệm:</strong>
                        <span th:text="${doctor.experience}"></span>
                        năm
                    </p>

                    <p th:text="${doctor.description}"></p>

                    <a th:href="@{/appointments/book/{id}(id=${doctor.id})}"
                       class="btn btn-primary w-100">
                        Đặt lịch
                    </a>

                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
