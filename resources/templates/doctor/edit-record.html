<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa bệnh án</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow border-0">
        <div class="card-body p-4">

            <h3 class="mb-4">Sửa bệnh án</h3>

            <form th:action="@{/doctor/medical-records/edit/{id}(id=${record.id})}"
                  th:object="${recordDTO}"
                  method="post">

                <div class="mb-3">
                    <label>Triệu chứng</label>
                    <textarea th:field="*{symptoms}"
                              class="form-control"
                              rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label>Chẩn đoán</label>
                    <textarea th:field="*{diagnosis}"
                              class="form-control"
                              rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label>Đơn thuốc</label>
                    <textarea th:field="*{prescription}"
                              class="form-control"
                              rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label>Ghi chú bác sĩ</label>
                    <textarea th:field="*{doctorNotes}"
                              class="form-control"
                              rows="3"></textarea>
                </div>

                <button class="btn btn-primary">
                    Cập nhật
                </button>

                <a th:href="@{/doctor/medical-records}"
                   class="btn btn-secondary">
                    Quay lại
                </a>

            </form>

        </div>
    </div>
</div>

</body>
</html>
