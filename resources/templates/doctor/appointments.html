<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch khám bác sĩ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Lịch khám của bác sĩ</h2>

    <table class="table table-bordered table-hover bg-white shadow">
        <thead class="table-dark">
        <tr>
            <th>Bệnh nhân</th>
            <th>Ngày</th>
            <th>Giờ</th>
            <th>Lý do</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="appointment : ${appointments}">
            <td th:text="${appointment.patient.user.fullName}"></td>
            <td th:text="${appointment.appointmentDate}"></td>
            <td th:text="${appointment.appointmentTime}"></td>
            <td th:text="${appointment.reason}"></td>
            <td th:text="${appointment.status}"></td>
            <td>
                <button
    				th:if="${appointment.status.name() == 'PENDING'}"

    				type="button"

    				class="btn btn-success btn-sm"

    				th:onclick="'confirmAppointment(\'/appointments/doctor/confirm/' + ${appointment.id} + '\')'">

    				Xác nhận

				</button>
				
				<a th:if="${appointment.status.name() == 'CONFIRMED'}"
       				th:href="@{/doctor/medical-records/create/{id}(id=${appointment.id})}"
       				class="btn btn-warning btn-sm">
        			Tạo bệnh án
    			</a>
    			
    			<a th:href="@{/chat/{senderId}/{receiverId}
					(senderId=${appointment.doctor.user.id},
					receiverId=${appointment.patient.user.id})}"
   					class="btn btn-dark btn-sm">
    				Chat
				</a>
                <button
    				th:if="${appointment.status.name() == 'CONFIRMED'}"

    				type="button"

    				class="btn btn-primary btn-sm"

    				th:onclick="'completeAppointment(\'/appointments/doctor/complete/' + ${appointment.id} + '\')'">

    				Hoàn thành

				</button>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/doctor/dashboard}"
       class="btn btn-secondary">
        Quay lại
    </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

function confirmAppointment(url){

    Swal.fire({

        title: 'Xác nhận lịch khám?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Xác nhận',
        cancelButtonText: 'Đóng'

    }).then((result) => {

        if(result.isConfirmed){

            window.location.href = url;

        }

    });

}

function completeAppointment(url){

    Swal.fire({

        title: 'Hoàn thành lịch khám?',
        icon: 'success',
        showCancelButton: true,
        confirmButtonText: 'Hoàn thành',
        cancelButtonText: 'Đóng'

    }).then((result) => {

        if(result.isConfirmed){

            window.location.href = url;

        }

    });

}

</script>
<div id="loading"
     style="display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(255,255,255,0.7);
            z-index:9999;
            justify-content:center;
            align-items:center;">

    <div class="spinner-border text-primary"></div>

</div>
</body>
</html>
