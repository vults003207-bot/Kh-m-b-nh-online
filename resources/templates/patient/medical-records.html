<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bệnh án của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Bệnh án của tôi</h2>

    <table class="table table-bordered bg-white shadow">
        <thead class="table-dark">
        <tr>
            <th>Bác sĩ</th>
            <th>Ngày khám</th>
            <th>Triệu chứng</th>
            <th>Chẩn đoán</th>
            <th>Đơn thuốc</th>
            <th>Ghi chú</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="record : ${recordPage.content}">
            <td th:text="${record.appointment.doctor.user.fullName}"></td>
            <td th:text="${record.appointment.appointmentDate}"></td>
            <td th:text="${record.symptoms}"></td>
            <td th:text="${record.diagnosis}"></td>
            <td th:text="${record.prescription}"></td>
            <td th:text="${record.doctorNotes}"></td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/patient/dashboard}" class="btn btn-secondary">
        Quay lại
    </a>

</div>

</body>
</html>
