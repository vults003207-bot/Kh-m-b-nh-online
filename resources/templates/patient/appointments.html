<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch khám của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">
        <h2>Lịch khám của tôi</h2>
        <a th:href="@{/doctors}" class="btn btn-primary">
            Đặt lịch mới
        </a>
    </div>

    <div th:if="${param.success}" class="alert alert-success">
        Đặt lịch thành công.
    </div>

    <table class="table table-bordered table-hover bg-white shadow">
        <thead class="table-dark">
        <tr>
            <th>Bác sĩ</th>
            <th>Ngày</th>
            <th>Giờ</th>
            <th>Lý do</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="appointment : ${appointments}">
            <td th:text="${appointment.doctor.user.fullName}"></td>
            <td th:text="${appointment.appointmentDate}"></td>
            <td th:text="${appointment.appointmentTime}"></td>
            <td th:text="${appointment.reason}"></td>
            <td th:text="${appointment.status}"></td>
            <td>
            	<a th:href="@{/chat/{senderId}/{receiverId}
					(senderId=${appointment.patient.user.id},
					receiverId=${appointment.doctor.user.id})}"
   					class="btn btn-dark btn-sm">
    				Chat
				</a>
		
                <button
    				th:if="${appointment.status.name() != 'CANCELLED'
           			and appointment.status.name() != 'COMPLETED'}"

    				type="button"

    				class="btn btn-danger btn-sm"

    				th:onclick="'confirmCancel(\'/appointments/cancel/' + ${appointment.id} + '\')'">

   				 	Hủy

				</button>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/patient/dashboard}"
       class="btn btn-secondary">
        Quay lại
    </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

function confirmCancel(url){

    Swal.fire({

        title: 'Bạn chắc chắn?',
        text: "Lịch khám sẽ bị hủy!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Hủy lịch',
        cancelButtonText: 'Đóng'

    }).then((result) => {

        if(result.isConfirmed){

            window.location.href = url;

        }

    });

}

</script>
<div id="loading"
     style="display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(255,255,255,0.7);
            z-index:9999;
            justify-content:center;
            align-items:center;">

    <div class="spinner-border text-primary"></div>

</div>
</body>
</html>
