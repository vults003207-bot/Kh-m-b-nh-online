<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1>Patient Dashboard</h1>

    <a th:href="@{/doctors}" class="btn btn-primary">
        Danh sách bác sĩ
    </a>

    <a th:href="@{/patient/appointments}" class="btn btn-success">
        Lịch khám của tôi
    </a>
    
	<a th:href="@{/patient/medical-records}" class="btn btn-warning">
    	Bệnh án của tôi
	</a>
	<a th:href="@{/profile}"
   		class="btn btn-info">
    	Profile
	</a>
				
    <a th:href="@{/logout}" class="btn btn-danger">
        Đăng xuất
    </a>
</div>

</body>
</html>>
