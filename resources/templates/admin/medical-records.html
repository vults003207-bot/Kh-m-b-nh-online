<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý bệnh án</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Quản lý bệnh án</h2>

    <form method="get" th:action="@{/admin/medical-records}" class="row mb-4">
        <div class="col-md-3">
            <input name="patientName"
                   class="form-control"
                   placeholder="Tên bệnh nhân"
                   th:value="${searchDTO.patientName}">
        </div>

        <div class="col-md-3">
            <input name="doctorName"
                   class="form-control"
                   placeholder="Tên bác sĩ"
                   th:value="${searchDTO.doctorName}">
        </div>

        <div class="col-md-2">
            <input type="date"
                   name="fromDate"
                   class="form-control"
                   th:value="${searchDTO.fromDate}">
        </div>

        <div class="col-md-2">
            <input type="date"
                   name="toDate"
                   class="form-control"
                   th:value="${searchDTO.toDate}">
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">
                Tìm kiếm
            </button>
        </div>
    </form>

    <table class="table table-bordered bg-white shadow">
        <thead class="table-dark">
        <tr>
            <th>Bệnh nhân</th>
            <th>Bác sĩ</th>
            <th>Triệu chứng</th>
            <th>Chẩn đoán</th>
            <th>Đơn thuốc</th>
            <th>Ngày tạo</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="record : ${recordPage.content}">
            <td th:text="${record.appointment.patient.user.fullName}"></td>
            <td th:text="${record.appointment.doctor.user.fullName}"></td>
            <td th:text="${record.symptoms}"></td>
            <td th:text="${record.diagnosis}"></td>
            <td th:text="${record.prescription}"></td>
            <td th:text="${record.createdAt}"></td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
        Quay lại Dashboard
    </a>

</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
