<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lịch khám</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow border-0">
        <div class="card-body p-4">

            <h3>Đặt lịch khám</h3>

            <div class="alert alert-info">
                Bác sĩ:
                <strong th:text="${doctor.user.fullName}"></strong>
                -
                <span th:text="${doctor.specialization}"></span>
            </div>

            <form th:action="@{/appointments/book}"
                  th:object="${appointmentDTO}"
                  method="post">

                <input type="hidden" th:field="*{doctorId}">
                <input type="hidden" th:field="*{patientId}">

                <div class="mb-3">
                    <label class="form-label">Ngày khám</label>
                    <input type="date"
                           th:field="*{appointmentDate}"
                           class="form-control">
                    <div class="text-danger"
                         th:errors="*{appointmentDate}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Giờ khám</label>
                    <input type="time"
                           th:field="*{appointmentTime}"
                           class="form-control">
                    <div class="text-danger"
                         th:errors="*{appointmentTime}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Lý do khám</label>
                    <textarea th:field="*{reason}"
                              class="form-control"
                              rows="4"></textarea>
                </div>

                <button class="btn btn-primary">
                    Xác nhận đặt lịch
                </button>

                <a th:href="@{/doctors}"
                   class="btn btn-secondary">
                    Quay lại
                </a>

            </form>

        </div>
    </div>
</div>

</body>
</html>
