<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Realtime Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow border-0">

        <div class="card-header bg-primary text-white">

            Chat với:
            <strong th:text="${receiver.fullName}"></strong>

        </div>

        <div class="card-body"
             id="chat-box"
             style="height: 400px;
                    overflow-y: auto;">

            <div th:each="msg : ${messages}">

                <div th:if="${msg.sender.id == sender.id}"
                     class="text-end mb-2">

                    <span class="badge bg-primary p-2"
                          th:text="${msg.messageContent}">
                    </span>

                </div>

                <div th:unless="${msg.sender.id == sender.id}"
                     class="text-start mb-2">

                    <span class="badge bg-secondary p-2"
                          th:text="${msg.messageContent}">
                    </span>

                </div>

            </div>

        </div>

        <div class="card-footer">

            <div class="input-group">

                <input type="text"
                       id="message"
                       class="form-control"
                       placeholder="Nhập tin nhắn...">

                <button class="btn btn-primary"
                        onclick="sendMessage()">
                    Gửi
                </button>

            </div>

        </div>

    </div>

</div>

<script th:inline="javascript">

    let senderId = [[${sender.id}]];
    let receiverId = [[${receiver.id}]];

    let socket = new SockJS('/chat');

    let stompClient = Stomp.over(socket);

    stompClient.connect({}, function () {

        stompClient.subscribe(
            '/topic/messages/' + senderId,
            function (messageOutput) {

                let msg = JSON.parse(messageOutput.body);

                appendMessage(
                    msg.messageContent,
                    false
                );
            }
        );
    });

    function sendMessage() {

        let messageInput =
            document.getElementById("message");

        let message = messageInput.value;

        if(message.trim() === '') {
            return;
        }

        stompClient.send(
            "/app/send-message",
            {},
            JSON.stringify({
                senderId: senderId,
                receiverId: receiverId,
                content: message
            })
        );

        appendMessage(message, true);

        messageInput.value = '';
    }

    function appendMessage(message, isMine) {

        let chatBox =
            document.getElementById("chat-box");

        let div =
            document.createElement("div");

        div.className =
            isMine
                ? "text-end mb-2"
                : "text-start mb-2";

        div.innerHTML =
            `<span class="badge ${
                isMine
                    ? 'bg-primary'
                    : 'bg-secondary'
            } p-2">${message}</span>`;

        chatBox.appendChild(div);

        chatBox.scrollTop =
            chatBox.scrollHeight;
    }

</script>

</body>

</html>
