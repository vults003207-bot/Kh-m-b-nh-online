<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Hospital Online')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="hero-section">

    <div class="container text-center">

        <h1 class="display-3 fw-bold">

            Hệ thống khám bệnh online

        </h1>

        <p class="lead mt-4">

            Đặt lịch khám với bác sĩ nhanh chóng,
            tiện lợi và hiện đại.

        </p>

        <a th:href="@{/register}"
           class="btn btn-warning btn-lg mt-3">

            Đăng ký ngay

        </a>

    </div>

</section>

<section class="py-5">

    <div class="container">

        <div class="text-center mb-5">

            <h2 class="fw-bold">
                Dịch vụ nổi bật
            </h2>

        </div>

        <div class="row">

            <div class="col-md-4 mb-4">

                <div class="card shadow-custom border-0 h-100">

                    <div class="card-body text-center">

                        <i class="bi bi-calendar-check
                                  text-primary fs-1"></i>

                        <h4 class="mt-3">
                            Đặt lịch online
                        </h4>

                        <p>
                            Đặt lịch khám dễ dàng chỉ trong vài phút.
                        </p>

                    </div>

                </div>

            </div>

            <div class="col-md-4 mb-4">

                <div class="card shadow-custom border-0 h-100">

                    <div class="card-body text-center">

                        <i class="bi bi-chat-dots
                                  text-success fs-1"></i>

                        <h4 class="mt-3">
                            Chat realtime
                        </h4>

                        <p>
                            Chat trực tiếp với bác sĩ mọi lúc.
                        </p>

                    </div>

                </div>

            </div>

            <div class="col-md-4 mb-4">

                <div class="card shadow-custom border-0 h-100">

                    <div class="card-body text-center">

                        <i class="bi bi-file-medical
                                  text-danger fs-1"></i>

                        <h4 class="mt-3">
                            Hồ sơ bệnh án
                        </h4>

                        <p>
                            Quản lý bệnh án trực tuyến tiện lợi.
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
